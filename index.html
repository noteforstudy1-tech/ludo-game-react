<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludo React - Static</title>
    
    <!-- Import Map for bare module specifiers -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19?dev",
          "react-dom": "https://esm.sh/react-dom@19?dev",
          "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
          "htm/react": "https://esm.sh/htm@3.1.1/react?external=react",
          "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react",
          "clsx": "https://esm.sh/clsx@2.1.1",
          "peerjs": "https://esm.sh/peerjs@1.5.4"
        }
      }
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ludo: {
                red: '#EF4444',
                green: '#22C55E',
                yellow: '#EAB308',
                blue: '#3B82F6',
                board: '#F3F4F6',
                safe: '#D1D5DB'
              }
            }
          }
        }
      }
    </script>
    <style>
      @keyframes animate-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-in {
        animation: animate-in 0.3s ease-out;
      }
      body {
        margin: 0;
        background-color: #030712; /* gray-950 */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
